# ============================================
# APPLICATION
# ============================================
spring.application.name=campuspulse

# ============================================
# DATABASE CONFIG
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/campus_pulse
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# ACADEMIC SESSION CONFIG
# ============================================
# Example: for 2025-2026 use 2026
app.session.current-year=2026

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# SWAGGER CONFIG
# ============================================
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packagesToScan=com.parag.campuspulse.controller
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.persistAuthorization=true
springdoc.swagger-ui.disable-swagger-default-url=true